<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hackathon Starter</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Hackathon Starter</h1>
            <p>Sign in to your account</p>
        </div>

        <form id="loginForm" novalidate>
            <div id="loginError" class="form-error visible" style="display: none;"></div>

            <div class="form-group">
                <label for="emailInput" class="form-label">Email</label>
                <input type="email" id="emailInput" class="form-input" placeholder="Enter your email" autocomplete="email" required>
                <span class="form-error" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="passwordInput" class="form-label">Password</label>
                <div class="form-input-wrapper">
                    <input type="password" id="passwordInput" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" id="togglePasswordBtn" class="form-toggle-password" aria-label="Toggle password visibility">&#128065;</button>
                </div>
                <span class="form-error" id="passwordError"></span>
            </div>

            <div class="form-group flex-between">
                <label class="form-checkbox">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary btn-full btn-lg">
                Sign In
            </button>

            <div id="loginLoader" class="hidden text-center mt-2">
                <span class="loader"></span>
            </div>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Create one</a>
        </div>
    </div>

    <script type="module" src="../js/app.js"></script>
</body>
</html>
